# Render blueprint — native Python (no Docker). Deploy: Render → New → Blueprint,
# point at this repo. Fill the `sync: false` secrets in the dashboard.
services:
  - type: web
    name: pr-guardian-backend
    runtime: python
    rootDir: backend
    plan: starter            # 512MB free tier is tight for fastembed; starter (=512MB) may OOM → bump if needed
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL          # Neon: postgresql+asyncpg://... (drop ?sslmode=require)
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_API_KEY
        sync: false
      - key: EMBED_MODEL
        value: BAAI/bge-small-en-v1.5
      - key: EMBEDDING_DIM
        value: "384"
      - key: GITHUB_WEBHOOK_SECRET
        generateValue: true
      # Set these to your Vercel frontend origin:
      - key: BACKEND_CORS_ORIGINS
        sync: false            # e.g. ["https://your-app.vercel.app"]
