# PR Guardian — full-stack Docker deployment.
#
# Usage:
#   cp .env.example backend/.env   # then edit with real values
#   docker compose up -d
#
# Services:
#   - postgres  : PostgreSQL 16 + pgvector extension
#   - backend   : FastAPI (serves the API, runs PR review in-process via
#                 BackgroundTasks — no Celery/Redis/worker needed)
#   - frontend  : Next.js standalone
#   - nginx     : reverse proxy (port 80)
#
# Embeddings run locally on CPU (fastembed) inside the backend container.
# LLM defaults to Groq (set GROQ_API_KEY); users can bring their own key/provider.

services:
  # ── Database ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prguardian-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-prguardian}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prguardian}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Backend (FastAPI + in-process background PR review) ─────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prguardian-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prguardian}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prguardian-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  # ── Nginx reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prguardian-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
