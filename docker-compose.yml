# PR Guardian — full-stack Docker deployment.
#
# Usage:
#   cp .env.example backend/.env   # then edit with real values
#   docker compose up -d
#
# Services:
#   - postgres  : PostgreSQL 16 + pgvector extension
#   - redis     : Redis for Celery task queue
#   - backend   : FastAPI (lightweight, only handles HTTP requests)
#   - worker    : Celery worker (handles heavy background tasks)
#   - frontend  : Next.js standalone
#   - nginx     : reverse proxy (port 80)
#   - ollama    : local LLM (opt-in, enable with: docker compose --profile ollama up -d)

services:
  # ── Database ────────────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: prguardian-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-prguardian}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-prguardian}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Redis for Celery ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: prguardian-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

  # ── Backend (FastAPI only - lightweight) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prguardian-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prguardian}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # ── Celery Worker (handles heavy background tasks) ─────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prguardian-worker
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-prguardian}
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    restart: unless-stopped
    command: python start_worker.py

  # ── Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prguardian-frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    restart: unless-stopped

  # ── Nginx reverse proxy ────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: prguardian-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  # ── Ollama (opt-in) ─────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: prguardian-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollamadata:/root/.ollama
    profiles: ["ollama"]
    restart: unless-stopped

volumes:
  pgdata:
  ollamadata:
